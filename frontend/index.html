<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rain or Shine - Eco-Tourism Coordinator for Bocas del Toro</title>
    <meta name="description" content="Rain or Shine: Seamless weather-intelligent digital eco-concierge, activity scheduler, and logistics coordinator for Bocas del Toro, Panama." />
    
    <!-- PWA Metadata -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#3ecdc6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/concierge_avatar.png" />

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js?v=3.1.2')
            .then(reg => {
              console.log('Service Worker registered successfully with scope:', reg.scope);
              // Force checking for updates immediately on load to bypass aggressive caching
              reg.update();
            })
            .catch(err => console.log('Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
